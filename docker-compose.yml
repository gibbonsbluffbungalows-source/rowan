services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    network_mode: host

  # CPU fallback — start with: docker compose --profile cpu-stt up -d wyoming-whisper-cpu
  wyoming-whisper-cpu:
    container_name: wyoming-whisper-cpu
    image: rhasspy/wyoming-whisper:latest
    command: --model medium --language en --beam-size 1
    profiles: ["cpu-stt"]
    volumes:
      - ./whisper-data:/data
    ports:
      - "10300:10300"
    restart: unless-stopped

  wyoming-whisper:
    container_name: wyoming-whisper
    image: lscr.io/linuxserver/faster-whisper:gpu
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - WHISPER_MODEL=medium
      - WHISPER_BEAM=1
      - WHISPER_LANG=en
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./whisper-gpu-data:/config
    ports:
      - "10300:10300"
    restart: unless-stopped

  wyoming-piper:
    container_name: wyoming-piper
    image: rhasspy/wyoming-piper:latest
    command: --voice en_US-amy-low
    volumes:
      - ./piper-data:/data
    ports:
      - "10200:10200"
    restart: unless-stopped

  kokoro-wyoming:
    container_name: kokoro-wyoming
    image: ghcr.io/relvacode/kokoro-wyoming:latest
    restart: unless-stopped

  # Strips [GUEST_SUMMARY]/[OPT_OUT] tags from Rowan's replies before TTS,
  # logs them to ./tag-filter-data/tags.log, and fires HA events.
  # Owns host port 10210 so HA's existing Kokoro integration needs no changes.
  wyoming-tag-filter:
    container_name: wyoming-tag-filter
    build: ./tag-filter
    depends_on:
      - kokoro-wyoming
    ports:
      - "10210:10210"
    volumes:
      - ./tag-filter-data:/data
      - ./.ha_token:/ha_token:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Translates the GibbonsBluff station's local Wunderground-style upload
  # (HTTP GET :8126 every 60s) into Ecowitt-protocol POSTs for HA's official
  # ecowitt integration. Fully local weather, survives internet outages.
  wu-bridge:
    container_name: wu-bridge
    build: ./wu-bridge
    environment:
      - ECOWITT_WEBHOOK_URL=http://host.docker.internal:8123/api/webhook/1f1aff67dd98963eabff65f8b332d7f1
    ports:
      - "8126:8126"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
