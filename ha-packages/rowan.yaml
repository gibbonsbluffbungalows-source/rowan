# Rowan concierge package — consumes the rowan_guest_summary / rowan_opt_out
# events fired by the wyoming-tag-filter container.
#
# Source of truth lives at /home/rowan/ha-packages/rowan.yaml (git-tracked);
# installed copy at /config/packages/rowan.yaml.

input_boolean:
  rowan_paused:
    name: Rowan paused (guest asked for space)
    icon: mdi:sleep
input_select:
  rowan_greeting_mode:
    name: Rowan morning greeting mode
    icon: mdi:weather-sunset-up
    options:
      - "off"          # no morning greeting at all
      - first_wake     # greet within Rowan's first reply of the day (guest initiates)
      - time           # unprompted announce at 8:30 — original behavior
      - motion         # placeholder: wire to Shelly motion sensor when installed

input_datetime:
  rowan_last_reply:
    name: Rowan last spoken reply
    has_date: true
    has_time: true

input_button:
  rowan_new_guest:
    name: Rowan new guest reset
    icon: mdi:account-switch

template:
  - triggers:
      - trigger: event
        event_type: rowan_guest_summary
        id: add
      - trigger: state
        entity_id: input_button.rowan_new_guest
        id: reset
    sensor:
      - name: Rowan Guest Notes
        unique_id: rowan_guest_notes
        icon: mdi:notebook-outline
        state: >-
          {% if trigger.id == 'reset' %}0{% else %}
          {{ ((state_attr('sensor.rowan_guest_notes', 'notes') or '').split('\n') | reject('eq', '') | list | length) + 1 }}
          {% endif %}
        attributes:
          notes: >-
            {% if trigger.id == 'reset' %}{% else %}
            {% set existing = state_attr('sensor.rowan_guest_notes', 'notes') or '' %}
            {% set value = trigger.event.data.value | trim %}
            {% if value and value in existing %}{{ existing }}{% else %}
            {{ ((existing ~ '\n- ' ~ now().strftime('%a %b %-d') ~ ': ' ~ value) | trim).split('\n')[-15:] | join('\n') }}
            {% endif %}{% endif %}

  # Compact weather summary refreshed every 30 min; injected into Rowan's
  # prompt by build_rowan_prompt.py. Fire event rowan_weather_refresh to
  # update on demand. Current conditions come from the GibbonsBluff station
  # at the property (ambient_network integration, polled by MAC — entry
  # installed by scripts/add_gibbonsbluff_entry.py); Met.no supplies the
  # sky condition and forecast, and is the fallback if the station is stale.
  - triggers:
      - trigger: time_pattern
        minutes: "/30"
      - trigger: homeassistant
        event: start
      - trigger: event
        event_type: rowan_weather_refresh
    actions:
      - action: weather.get_forecasts
        data:
          type: daily
        target:
          entity_id: weather.forecast_cliffside_bungalow
        response_variable: daily
    sensor:
      - name: Rowan Weather Brief
        unique_id: rowan_weather_brief
        icon: mdi:weather-partly-cloudy
        state: "{{ states('weather.forecast_cliffside_bungalow') }}"
        attributes:
          brief: >-
            {% set w = 'weather.forecast_cliffside_bungalow' %}
            {% set f = ((daily.get(w, {}).get('forecast', []) or [{}])[0]) %}
            {% set sky = states(w) | replace('partlycloudy', 'partly cloudy') | replace('clear-night', 'clear') %}
            {% if has_value('sensor.ws_2902_gibbonsbluff_outdoor_temperature') %}
            Right now on the bluff, measured at the bungalow's own weather station: {{ states('sensor.ws_2902_gibbonsbluff_outdoor_temperature') | float(0) | round(0) }} degrees (feels like {{ states('sensor.ws_2902_gibbonsbluff_feels_like_temperature') | float(0) | round(0) }}), humidity {{ states('sensor.ws_2902_gibbonsbluff_humidity') | float(0) | round(0) }} percent, wind {{ states('sensor.ws_2902_gibbonsbluff_wind_speed') | float(0) | round(0) }} mph
            {%- if has_value('sensor.gibbonsbluff_max_daily_gust') %} with gusts up to {{ states('sensor.gibbonsbluff_max_daily_gust') | float(0) | round(0) }} today{% endif %}, sky {{ sky }}.
            Inside the bungalow it is {{ states('sensor.ws_2902_gibbonsbluff_indoor_temperature') | float(0) | round(0) }} degrees.
            {%- if states('sensor.ws_2902_gibbonsbluff_daily_rain') | float(0) > 0 %} Rain so far today: {{ states('sensor.ws_2902_gibbonsbluff_daily_rain') }} inches.{% endif %}
            {%- if states('sensor.ws_2902_gibbonsbluff_uv_index') | float(0) >= 6 %} UV index {{ states('sensor.ws_2902_gibbonsbluff_uv_index') | float(0) | round(0) }} — strong sun.{% endif %}
            {% elif has_value('sensor.gibbonsbluff_temperature') %}
            Right now on the bluff, measured at the bungalow's own weather station: {{ states('sensor.gibbonsbluff_temperature') | float(0) | round(0) }} degrees (feels like {{ states('sensor.gibbonsbluff_feels_like') | float(0) | round(0) }}), humidity {{ states('sensor.gibbonsbluff_humidity') | float(0) | round(0) }} percent, wind {{ states('sensor.gibbonsbluff_wind_speed') | float(0) | round(0) }} mph with gusts up to {{ states('sensor.gibbonsbluff_max_daily_gust') | float(0) | round(0) }} today, sky {{ sky }}.
            {%- if states('sensor.gibbonsbluff_daily_rain') | float(0) > 0 %} Rain so far today: {{ states('sensor.gibbonsbluff_daily_rain') }} inches.{% endif %}
            {%- if states('sensor.gibbonsbluff_uv_index') | float(0) >= 6 %} UV index {{ states('sensor.gibbonsbluff_uv_index') | float(0) | round(0) }} — strong sun.{% endif %}
            {% else %}
            Right now on the bluff: {{ state_attr(w, 'temperature') }} degrees and {{ sky }}, wind {{ state_attr(w, 'wind_speed') | round(0) }} mph.
            {% endif %}
            Today's forecast: {{ f.get('condition', 'unknown') | replace('partlycloudy', 'partly cloudy') }}, high {{ f.get('temperature', '?') }}, low {{ f.get('templow', '?') }}, {{ f.get('precipitation_probability', 0) }} percent chance of precipitation.
            (Remember the valley floor runs about 7 degrees warmer than the bluff.)

automation:
  - alias: Rowan opt-out handling
    id: rowan_opt_out_handling
    mode: queued
    triggers:
      - trigger: event
        event_type: rowan_opt_out
    actions:
      - choose:
          # "Rowan, take a break" — stay quiet but keep listening so
          # "Rowan, we're back" still works.
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.value | lower == 'pause' }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.rowan_paused
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.value | lower == 'resume' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.rowan_paused
          # "We don't want to use you" — hard-mute the satellite mic.
          # Voice can't undo this (mic is off); unmute from the HA UI or
          # the new-guest reset button.
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.value | lower == 'silence' }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.rowan_paused
              - action: switch.turn_on
                target:
                  entity_id: switch.rowan_cliffside_mute

  # Stamp the time of every spoken reply. Fires on 'responding' (after the
  # LLM prompt has rendered) so first-conversation detection in the prompt
  # can't see its own interaction.
  - alias: Rowan stamp last reply
    id: rowan_stamp_last_reply
    mode: queued
    triggers:
      - trigger: state
        entity_id: assist_satellite.rowan_cliffside
        to: responding
    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.rowan_last_reply
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # Unprompted morning greeting via announce — only in 'time' mode (default
  # is first_wake: the greeting rides inside Rowan's first reply of the day
  # instead, handled in the prompt template). Only fires when guest notes
  # exist, so an empty bungalow stays quiet. 8:30 = after quiet hours end.
  - alias: Rowan morning greeting
    id: rowan_morning_greeting
    triggers:
      - trigger: time
        at: "08:30:00"
    conditions:
      - condition: state
        entity_id: input_select.rowan_greeting_mode
        state: time
      - condition: state
        entity_id: input_boolean.rowan_paused
        state: "off"
      - condition: state
        entity_id: switch.rowan_cliffside_mute
        state: "off"
      - condition: template
        value_template: "{{ (state_attr('sensor.rowan_guest_notes', 'notes') or '') | trim != '' }}"
    actions:
      - action: conversation.process
        data:
          agent_id: conversation.rowan
          text: >-
            Host system instruction, not a guest speaking: compose your
            unprompted morning greeting to the guests for today. Two or three
            short sentences, warm and unhurried. If your guest notes mention an
            injury, yesterday's outing, or plans for today, check in on it
            naturally. Offer at most one fitting idea for the day. The guests
            have not said anything — this is you greeting them first, so do not
            answer or reference a question.
        response_variable: greeting
      - action: assist_satellite.announce
        target:
          entity_id: assist_satellite.rowan_cliffside
        data:
          message: "{{ greeting.response.speech.plain.speech }}"

  # Guest's spoken answer to Rowan's morning-greeting offer (the model emits
  # [MORNING_GREETING: yes|no]; the tag filter fires this event).
  - alias: Rowan morning greeting preference
    id: rowan_morning_greeting_preference
    triggers:
      - trigger: event
        event_type: rowan_morning_greeting_pref
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.value | lower in ['yes', 'on', 'sure', 'please'] }}"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.rowan_greeting_mode
                data:
                  option: time
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.value | lower in ['no', 'off'] }}"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.rowan_greeting_mode
                data:
                  option: first_wake

  # Prefill the LLM after HA restarts so the first guest question doesn't
  # eat the ~14s prompt-prefill cost.
  - alias: Rowan warm up model
    id: rowan_warm_up_model
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - delay: "00:00:45"
      - action: conversation.process
        continue_on_error: true
        data:
          agent_id: conversation.rowan
          text: >-
            Host system instruction, not a guest speaking: this is a warm-up
            ping after a restart. Reply with the single word: ready.

  # Tell Mark when the satellite drops: push to his phone + HA UI notification.
  - alias: Rowan satellite offline alert
    id: rowan_satellite_offline_alert
    mode: single
    triggers:
      - trigger: state
        entity_id: assist_satellite.rowan_cliffside
        to: unavailable
        for: "00:05:00"
    actions:
      - action: notify.mobile_app_mark_s_phone
        continue_on_error: true
        data:
          title: Rowan satellite offline
          message: >-
            The Cliffside satellite has been down for 5 minutes — guests
            cannot talk to Rowan. Check the Pi (ssh pi@100.87.194.126,
            journalctl -u wyoming-satellite -n 50).
      - action: persistent_notification.create
        data:
          title: Rowan satellite offline
          message: >-
            The Cliffside satellite has been unavailable for 5 minutes
            (since {{ trigger.from_state.last_changed if trigger.from_state else 'unknown' }}).
            Guests cannot talk to Rowan. Check the Pi: ssh pi@100.87.194.126,
            then journalctl -u wyoming-satellite -n 50.

  # KB gaps also go to Mark's phone so the KB gets filled while it's fresh.
  - alias: Rowan KB gap push
    id: rowan_kb_gap_push
    mode: queued
    triggers:
      - trigger: event
        event_type: rowan_kb_gap
    actions:
      - action: notify.mobile_app_mark_s_phone
        continue_on_error: true
        data:
          title: Rowan couldn't answer a guest
          message: '"{{ trigger.event.data.value }}" — add it to the knowledge base.'

  # KB gap log: Rowan emits [KB_GAP: question] when the knowledge base
  # couldn't answer; the tag filter fires this event (and logs to
  # tag-filter-data/tags.log). Kept as a notification so gaps are visible
  # without digging through logs.
  - alias: Rowan KB gap noted
    id: rowan_kb_gap_noted
    mode: queued
    triggers:
      - trigger: event
        event_type: rowan_kb_gap
    actions:
      - action: persistent_notification.create
        data:
          notification_id: "rowan_kb_gap_{{ trigger.event.data.value | slugify }}"
          title: Rowan couldn't answer a guest
          message: >-
            "{{ trigger.event.data.value }}" — consider adding this to the
            knowledge base (Rowan_Knowledge file), then rerun
            scripts/build_rowan_prompt.py.

  # Guest asked Rowan to switch language (the model emits [LANGUAGE: es|en];
  # the tag filter fires this event). Flipping the satellite's assistant
  # select swaps the whole pipeline — Spanish STT, prompt cue, and the
  # em_alex Kokoro voice — starting with the next wake word.
  - alias: Rowan language switch
    id: rowan_language_switch
    mode: queued
    triggers:
      - trigger: event
        event_type: rowan_language
    actions:
      - action: select.select_option
        target:
          entity_id: select.rowan_cliffside_assistant
        data:
          option: >-
            {{ 'Rowan ES' if trigger.event.data.value | lower in ['es', 'spanish', 'español', 'espanol'] else 'Rowan' }}

  - alias: Rowan new guest reset actions
    id: rowan_new_guest_reset_actions
    triggers:
      - trigger: state
        entity_id: input_button.rowan_new_guest
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.rowan_paused
      - action: switch.turn_off
        target:
          entity_id: switch.rowan_cliffside_mute
      - action: input_select.select_option
        target:
          entity_id: input_select.rowan_greeting_mode
        data:
          option: first_wake
      - action: select.select_option
        target:
          entity_id: select.rowan_cliffside_assistant
        data:
          option: Rowan
